<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>注册 · 寰宇志</title>
<link href="css/index.css" rel="stylesheet">
</head>
<body class="register-page">
  <main class="register-shell">
    <div class="register-toolbar">
      <a href="index.html" data-i18n="back">返回地图</a>
      <select id="register-language" aria-label="Language">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
    <form class="register-form">
      <img class="register-knocker" src="assets/knocker.png" alt="">
      <h1 data-i18n="title">注册账号</h1>
      <label>
        <span class="is-required" data-i18n="username">用户名</span>
        <input id="register-username" type="text" autocomplete="username" required>
      </label>
      <label>
        <span class="is-required" data-i18n="email">邮箱</span>
        <input id="register-email" type="email" autocomplete="email" required>
      </label>
      <label>
        <span class="is-required" data-i18n="password">密码</span>
        <input id="register-password" type="password" autocomplete="new-password" required>
      </label>
      <label>
        <span class="is-required" data-i18n="confirmPassword">确认密码</span>
        <input id="register-confirm-password" type="password" autocomplete="new-password" required>
      </label>
      <div class="register-field-grid">
        <label>
          <span data-i18n="firstName">名字（选填）</span>
          <input id="register-first-name" type="text" autocomplete="given-name">
        </label>
        <label>
          <span data-i18n="lastName">姓氏（选填）</span>
          <input id="register-last-name" type="text" autocomplete="family-name">
        </label>
      </div>
      <div class="register-field-grid">
        <label>
          <span data-i18n="fromCountry">来自（选填）</span>
          <select id="register-from-country" autocomplete="country-name">
            <option value="" data-i18n="countryPlaceholder">选择国家/地区</option>
          </select>
        </label>
        <label>
          <span data-i18n="birthday">生日（选填）</span>
          <input id="register-birthday" type="date">
        </label>
      </div>
      <label>
        <span data-i18n="preferredCountry">偏好国家（选填）</span>
        <select id="register-preferred-country" autocomplete="country-name">
          <option value="" data-i18n="countryPlaceholder">选择国家/地区</option>
        </select>
      </label>
      <button type="submit" data-i18n="submit">创建账号</button>
    </form>
  </main>
  <script>
    const registerCopy = {
      zh: {
        pageTitle: '注册 · 寰宇志',
        back: '返回地图',
        title: '注册账号',
        username: '用户名',
        email: '邮箱',
        password: '密码',
        confirmPassword: '确认密码',
        firstName: '名字（选填）',
        lastName: '姓氏（选填）',
        fromCountry: '来自（选填）',
        countryPlaceholder: '选择国家/地区',
        birthday: '生日（选填）',
        preferredCountry: '偏好国家/地区（选填）',
        submit: '创建账号'
      },
      en: {
        pageTitle: 'Register · Yuanyuzhi',
        back: 'Back to map',
        title: 'Create account',
        username: 'Username',
        email: 'Email',
        password: 'Password',
        confirmPassword: 'Confirm password',
        firstName: 'First name (optional)',
        lastName: 'Last name (optional)',
        fromCountry: 'From (optional)',
        countryPlaceholder: 'Select country/region',
        birthday: 'Birthday (optional)',
        preferredCountry: 'Preferred country/region (optional)',
        submit: 'Create account'
      }
    };

    const languageSelect = document.getElementById('register-language');
    const birthdayInput = document.getElementById('register-birthday');
    const fromCountrySelect = document.getElementById('register-from-country');
    const preferredCountrySelect = document.getElementById('register-preferred-country');
    const legacyLanguage = localStorage.getItem('touringGuideLanguage');
    if (localStorage.getItem('yuanyuzhiLanguage') === null && legacyLanguage !== null) {
      localStorage.setItem('yuanyuzhiLanguage', legacyLanguage);
    }
    const initialLanguage = localStorage.getItem('yuanyuzhiLanguage') || document.documentElement.lang || 'zh';
    const apiBase = window.location.origin && window.location.port === '3000'
      ? window.location.origin
      : 'http://localhost:3000';

    if (birthdayInput) {
      birthdayInput.max = new Date().toISOString().slice(0, 10);
    }

    function applyRegisterLanguage(language) {
      const lang = registerCopy[language] ? language : 'zh';
      const copy = registerCopy[lang];
      document.documentElement.lang = lang;
      document.title = copy.pageTitle;
      document.querySelectorAll('[data-i18n]').forEach(element => {
        element.textContent = copy[element.dataset.i18n] || '';
      });
      localStorage.setItem('yuanyuzhiLanguage', lang);
      languageSelect.value = lang;
      loadCountries(lang);
    }

    function resetCountrySelect(select, placeholder) {
      if (!select) return;
      select.textContent = '';
      const option = document.createElement('option');
      option.value = '';
      option.textContent = placeholder;
      select.appendChild(option);
      select.disabled = true;
    }

    async function loadCountries(language) {
      const copy = registerCopy[language] || registerCopy.zh;
      const selects = [fromCountrySelect, preferredCountrySelect].filter(Boolean);
      if (selects.length === 0) return;
      selects.forEach(select => resetCountrySelect(select, copy.countryPlaceholder));
      try {
        const response = await fetch(`${apiBase}/api/countries?lang=${encodeURIComponent(language)}`, {
          headers: { Accept: 'application/json' }
        });
        if (!response.ok) throw new Error('Failed to load countries');
        const data = await response.json();
        selects.forEach(select => {
          (data.countries || []).forEach(country => {
            const countryName = (country.countryName || country.name || '').trim();
            if (!countryName) return;
            const option = document.createElement('option');
            option.value = country.countryCode || countryName;
            option.textContent = countryName;
            select.appendChild(option);
          });
          select.disabled = false;
        });
      } catch (error) {
        selects.forEach(select => {
          select.disabled = true;
        });
      }
    }

    languageSelect.addEventListener('change', () => {
      applyRegisterLanguage(languageSelect.value);
    });

    applyRegisterLanguage(initialLanguage);
  </script>
</body>
</html>
